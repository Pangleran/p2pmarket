openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: P2P Game Item Trading Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User operations
  - name: listings
    description: Item listing operations
  - name: transactions
    description: Transaction operations
  - name: wallet
    description: Wallet operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with Discord mock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logout success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{userId}:
    get:
      operationId: getUserById
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /wallet/balance:
    get:
      operationId: getWalletBalance
      tags: [wallet]
      summary: Get wallet balance
      responses:
        "200":
          description: Wallet balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletBalance"

  /wallet/topup:
    post:
      operationId: topupWallet
      tags: [wallet]
      summary: Top up wallet balance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TopupRequest"
      responses:
        "200":
          description: Top up success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletBalance"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /wallet/transactions:
    get:
      operationId: getWalletTransactions
      tags: [wallet]
      summary: Get wallet transaction history
      responses:
        "200":
          description: Wallet transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WalletTransaction"

  /wallet/withdraw:
    post:
      operationId: requestWithdrawal
      tags: [wallet]
      summary: Request a withdrawal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawalRequest"
      responses:
        "201":
          description: Withdrawal request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Withdrawal"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /wallet/withdrawals:
    get:
      operationId: getMyWithdrawals
      tags: [wallet]
      summary: Get current user withdrawal history
      responses:
        "200":
          description: Withdrawal list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Withdrawal"

  /admin/withdrawals:
    get:
      operationId: getAdminWithdrawals
      tags: [admin]
      summary: Admin - get all withdrawals
      responses:
        "200":
          description: All withdrawals with user info
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WithdrawalWithUser"

  /admin/withdrawals/{withdrawalId}/approve:
    post:
      operationId: approveWithdrawal
      tags: [admin]
      summary: Admin - approve a withdrawal
      parameters:
        - name: withdrawalId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Withdrawal approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Withdrawal"
        "404":
          description: Not found

  /admin/withdrawals/{withdrawalId}/reject:
    post:
      operationId: rejectWithdrawal
      tags: [admin]
      summary: Admin - reject a withdrawal
      parameters:
        - name: withdrawalId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectWithdrawalRequest"
      responses:
        "200":
          description: Withdrawal rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Withdrawal"
        "404":
          description: Not found

  /listings:
    get:
      operationId: getListings
      tags: [listings]
      summary: Get all active listings
      parameters:
        - name: game
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Listing"

    post:
      operationId: createListing
      tags: [listings]
      summary: Create a new listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateListingRequest"
      responses:
        "201":
          description: Listing created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /listings/{listingId}:
    get:
      operationId: getListingById
      tags: [listings]
      summary: Get listing by ID
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Listing found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: updateListing
      tags: [listings]
      summary: Update a listing (owner only, active listings only)
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateListingRequest"
      responses:
        "200":
          description: Listing updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteListing
      tags: [listings]
      summary: Delete a listing
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Listing deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /listings/my:
    get:
      operationId: getMyListings
      tags: [listings]
      summary: Get current user's listings
      responses:
        "200":
          description: My listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Listing"

  /transactions:
    get:
      operationId: getTransactions
      tags: [transactions]
      summary: Get current user's transactions
      responses:
        "200":
          description: Transactions list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

    post:
      operationId: createTransaction
      tags: [transactions]
      summary: Buy a listing (create transaction)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransactionRequest"
      responses:
        "201":
          description: Transaction created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "400":
          description: Bad request (insufficient balance, own listing, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transactions/{transactionId}:
    get:
      operationId: getTransactionById
      tags: [transactions]
      summary: Get transaction by ID
      parameters:
        - name: transactionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Transaction found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transactions/{transactionId}/seller-confirm:
    post:
      operationId: sellerConfirmSent
      tags: [transactions]
      summary: Seller confirms item has been sent
      parameters:
        - name: transactionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProofRequest"
      responses:
        "200":
          description: Confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transactions/{transactionId}/buyer-confirm:
    post:
      operationId: buyerConfirmReceived
      tags: [transactions]
      summary: Buyer confirms item has been received (releases escrow)
      parameters:
        - name: transactionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProofRequest"
      responses:
        "200":
          description: Confirmed and escrow released
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transactions/{transactionId}/dispute:
    post:
      operationId: disputeTransaction
      tags: [transactions]
      summary: Open a dispute for a transaction
      parameters:
        - name: transactionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DisputeRequest"
      responses:
        "200":
          description: Dispute opened
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    LoginRequest:
      type: object
      properties:
        username:
          type: string
        discordId:
          type: string
        avatarUrl:
          type: string
      required:
        - username
        - discordId

    LoginResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
      required:
        - user
        - token

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        discordId:
          type: string
        avatarUrl:
          type: string
          nullable: true
        rating:
          type: number
          format: float
        totalTrades:
          type: integer
        joinedAt:
          type: string
          format: date-time
        walletBalance:
          type: number
          format: float
      required:
        - id
        - username
        - discordId
        - rating
        - totalTrades
        - joinedAt
        - walletBalance

    WalletBalance:
      type: object
      properties:
        balance:
          type: number
          format: float
        escrowBalance:
          type: number
          format: float
      required:
        - balance
        - escrowBalance

    WalletTransaction:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [topup, escrow_hold, escrow_release, payment_received]
        amount:
          type: number
          format: float
        description:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - type
        - amount
        - description
        - createdAt

    TopupRequest:
      type: object
      properties:
        amount:
          type: number
          format: float
        method:
          type: string
          enum: [bank_transfer, qris, gopay, ovo, dana]
      required:
        - amount
        - method

    Listing:
      type: object
      properties:
        id:
          type: integer
        sellerId:
          type: integer
        seller:
          $ref: "#/components/schemas/User"
        title:
          type: string
        description:
          type: string
        game:
          type: string
        category:
          type: string
        price:
          type: number
          format: float
        imageUrl:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, sold, cancelled]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - sellerId
        - seller
        - title
        - description
        - game
        - category
        - price
        - status
        - createdAt
        - updatedAt

    CreateListingRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        game:
          type: string
        category:
          type: string
        price:
          type: number
          format: float
        imageUrl:
          type: string
          nullable: true
      required:
        - title
        - description
        - game
        - category
        - price

    UpdateListingRequest:
      type: object
      description: All fields are optional. Only active listings can be updated by their owner.
      properties:
        title:
          type: string
        description:
          type: string
        game:
          type: string
        category:
          type: string
        price:
          type: number
          format: float
        imageUrl:
          type: string
          nullable: true

    Transaction:
      type: object
      properties:
        id:
          type: integer
        listingId:
          type: integer
        listing:
          $ref: "#/components/schemas/Listing"
        buyerId:
          type: integer
        buyer:
          $ref: "#/components/schemas/User"
        sellerId:
          type: integer
        seller:
          $ref: "#/components/schemas/User"
        amount:
          type: number
          format: float
        status:
          type: string
          enum: [pending, awaiting_delivery, delivery_confirmed, completed, disputed, cancelled]
        sellerProofUrl:
          type: string
          nullable: true
        buyerProofUrl:
          type: string
          nullable: true
        disputeReason:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - listingId
        - listing
        - buyerId
        - buyer
        - sellerId
        - seller
        - amount
        - status
        - createdAt
        - updatedAt

    CreateTransactionRequest:
      type: object
      properties:
        listingId:
          type: integer
      required:
        - listingId

    ProofRequest:
      type: object
      properties:
        proofUrl:
          type: string
        notes:
          type: string
          nullable: true
      required:
        - proofUrl

    DisputeRequest:
      type: object
      properties:
        reason:
          type: string
      required:
        - reason

    WithdrawalRequest:
      type: object
      properties:
        amount:
          type: number
          format: float
        method:
          type: string
        accountNumber:
          type: string
        accountName:
          type: string
      required:
        - amount
        - method
        - accountNumber
        - accountName

    RejectWithdrawalRequest:
      type: object
      properties:
        adminNote:
          type: string
          nullable: true

    Withdrawal:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        amount:
          type: number
          format: float
        method:
          type: string
        accountNumber:
          type: string
        accountName:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        adminNote:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - amount
        - method
        - accountNumber
        - accountName
        - status
        - createdAt
        - updatedAt

    WithdrawalWithUser:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        user:
          $ref: "#/components/schemas/User"
        amount:
          type: number
          format: float
        method:
          type: string
        accountNumber:
          type: string
        accountName:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        adminNote:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - user
        - amount
        - method
        - accountNumber
        - accountName
        - status
        - createdAt
        - updatedAt
